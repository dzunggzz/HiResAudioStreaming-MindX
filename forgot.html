<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>forgot password</title>
        <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body
        class="min-h-screen flex items-center justify-center px-4 py-8 bg-gray-50 text-black font-inter overflow-hidden"
    >
        <div
            class="main-container w-full max-w-md bg-white p-10 rounded-lg shadow-lg"
        >
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold text-black mb-2">
                    Forgot Password?
                </h1>
                <p class="text-gray-600">
                    Enter your email to reset your password
                </p>
            </div>

            <form id="forgot-form" class="space-y-6">
                <div class="input-container">
                    <label
                        for="forgot-email"
                        class="block text-lg font-medium text-gray-700 mb-2"
                        >Email</label
                    >
                    <input
                        type="email"
                        id="forgot-email"
                        name="email"
                        required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Enter your email"
                    />
                </div>

                <button
                    type="submit"
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200 font-semibold"
                >
                    Reset Password
                </button>

                <div class="text-center mt-4">
                    <a
                        href="./login.html"
                        class="text-sm text-blue-600 hover:text-blue-800 underline"
                        >Back to Login</a
                    >
                </div>
            </form>
        </div>

        <script type="module" src="./scripts/firebase.js"></script>
        <script type="module" src="./scripts/forgot.js"></script>
    </body>
</html>
