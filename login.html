<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>login/register</title>
        <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="./styles/login.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    </head>
    <body
        class="min-h-screen flex items-center justify-center px-4 py-8 bg-gray-50 text-black font-inter overflow-hidden"
    >
        <div class="grid-background"></div>
        <div
            class="main-container w-full max-w-6xl flex flex-row items-center justify-evenly"
        >
            <div class="image-container">
                <img
                    id="background-image"
                    src="./assets/merlin_prismriver.webp"
                    alt=""
                    class="login-image w-96 h-fit object-contain"
                />
            </div>
            <div class="flex flex-col items-left">
                <div
                    class="welcome-block w-full max-w-md h-48 flex flex-col justify-center mb-10"
                    id="welcome-block"
                >
                    <h1
                        class="text-6xl lg:text-7xl font-bold leading-tight text-black"
                    >
                        Welcome back,
                        <span class="traveler-text text-blue-500">User!</span>
                    </h1>
                </div>
                <div class="content-row flex items-start justify-center gap-8">
                    <div
                        class="login-form-block bg-white p-10 rounded-lg shadow-lg w-full max-w-md box-border"
                    >
                        <div id="login-container">
                            <form id="login-form" class="space-y-4">
                                <div class="input-container">
                                    <label
                                        for="login-email"
                                        class="block text-lg font-medium text-gray-700 mb-2"
                                        >Email</label
                                    >
                                    <input
                                        type="email"
                                        id="login-email"
                                        name="email"
                                        required
                                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    />
                                </div>

                                <div class="input-container">
                                    <div
                                        class="flex justify-between items-center mb-2"
                                    >
                                        <label
                                            for="login-password"
                                            class="block text-lg font-medium text-gray-700"
                                            >Password</label
                                        >
                                        <i
                                            data-lucide="eye"
                                            class="show-password-icon cursor-pointer w-5 h-5 text-gray-500 hover:text-gray-700"
                                            onclick="
                                                revealPassword('login-password')
                                            "
                                        ></i>
                                    </div>
                                    <input
                                        type="password"
                                        id="login-password"
                                        name="password"
                                        required
                                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    />
                                </div>
                                <div class="flex items-center space-x-2 mt-4">
                                    <input
                                        type="checkbox"
                                        id="remember-me"
                                        name="remember-me"
                                        class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500"
                                    />
                                    <label
                                        for="remember-me"
                                        class="text-sm text-gray-600"
                                        >Remember me</label
                                    >
                                </div>
                                <a
                                    href="./forgot.html"
                                    class="block text-xs text-blue-600 hover:text-blue-800 underline mt-2"
                                    target="_blank"
                                    >Forgot Password?</a
                                >

                                <button
                                    type="submit"
                                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200 font-semibold"
                                >
                                    Continue
                                </button>

                                <a
                                    href="#"
                                    class="block text-xs text-blue-600 hover:text-blue-800 underline mt-2"
                                    id="show-register"
                                    >Don't Have An Account?</a
                                >
                            </form>
                        </div>

                        <div id="register-container" style="display: none">
                            <form id="register-form" class="space-y-4">
                                <div class="input-container">
                                    <label
                                        for="register-email"
                                        class="block text-lg font-medium text-gray-700 mb-2"
                                        >Email</label
                                    >
                                    <input
                                        type="email"
                                        id="register-email"
                                        name="email"
                                        required
                                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    />
                                </div>

                                <div class="input-container">
                                    <div
                                        class="flex justify-between items-center mb-2"
                                    >
                                        <label
                                            for="register-password"
                                            class="block text-lg font-medium text-gray-700"
                                            >Password</label
                                        >
                                        <i
                                            data-lucide="eye"
                                            class="show-password-icon cursor-pointer w-5 h-5 text-gray-500 hover:text-gray-700"
                                            onclick="
                                                revealPassword(
                                                    'register-password',
                                                )
                                            "
                                        ></i>
                                    </div>
                                    <input
                                        type="password"
                                        id="register-password"
                                        name="password"
                                        required
                                        minlength="6"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    />
                                </div>

                                <div class="input-container">
                                    <div
                                        class="flex justify-between items-center mb-2"
                                    >
                                        <label
                                            for="confirm_password"
                                            class="block text-lg font-medium text-gray-700"
                                            >Confirm Password</label
                                        >
                                        <i
                                            data-lucide="eye"
                                            class="show-password-icon cursor-pointer w-5 h-5 text-gray-500 hover:text-gray-700"
                                            onclick="
                                                revealPasswordtwo(
                                                    'confirm_password',
                                                )
                                            "
                                        ></i>
                                    </div>
                                    <input
                                        type="password"
                                        id="confirm_password"
                                        name="confirm_password"
                                        required
                                        minlength="6"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    />
                                </div>

                                <button
                                    type="submit"
                                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200 font-semibold"
                                >
                                    Join now!
                                </button>

                                <a
                                    href="#"
                                    class="block text-xs text-blue-600 hover:text-blue-800 underline mt-2"
                                    id="show-login"
                                    >Already have an Account?</a
                                >
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="./scripts/firebase.js"></script>
        <script src="./scripts/reveal_confirmPass.js"></script>
        <script type="module" src="./scripts/login.js"></script>
    </body>
</html>
