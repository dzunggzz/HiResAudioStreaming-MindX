<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tidal clone lol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
  </head>
  <body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
      <div class="py-8 text-center">
        <div class="mb-4 flex items-end justify-center gap-2">
          <h2
            class="bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-[1.875rem]/[2.5rem] sm:text-[3rem]/[4rem] font-bold text-transparent"
          >
            HiResAudioStreaming
          </h2>
          <span class="text-sm text-gray-400">v3.6</span>
        </div>
        <p class="mx-auto max-w-2xl text-xl text-gray-400">
          Try some Touhou music if you don't know what to listen to! <br>
          Or check out the Top Tracks tab!
        </p>
      </div>

      <div class="w-full">
        <div class="mb-6">
          <div
            class="search-glass rounded-lg border shadow-sm transition-colors focus-within:border-blue-500 py-2 px-3 pr-2"
          >
            <div class="flex gap-2 flex-row sm:items-center sm:justify-between">
              <div class="flex min-w-0 flex-1 items-center gap-2">
                <input
                  id="searchInput"
                  type="text"
                  placeholder="Search for anything!"
                  class="w-full min-w-0 flex-1 border-none p-0 pl-1 bg-transparent text-white placeholder:text-gray-400 focus:outline-none ring-0"
                  aria-label="Search input"
                />
              </div>
              <div class="flex gap-2 w-auto flex-row items-center">
                <button
                  id="searchBtn"
                  class="search-button h-full flex items-center justify-center gap-2 rounded-md px-3 py-2 text-sm font-semibold text-white transition-colors"
                  aria-label="Search"
                >
                  <i data-lucide="search" style="width: 16px; height: 16px"></i>
                  <span class="hidden sm:inline">Search</span>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="mb-6 flex gap-2 overflow-x-auto scrollbar-hide border-b border-gray-700 svelte-14p3n6n" role="tablist">
          <button id="trackSearchTab" class="flex cursor-pointer items-center gap-2 border-b-2 px-3 sm:px-4 py-2 transition-colors whitespace-nowrap border-blue-500 text-blue-500 svelte-14p3n6n" role="tab" aria-selected="true" aria-label="Search tracks">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18V5l12-2v13"></path>
                    <circle cx="6" cy="18" r="3"></circle>
                    <circle cx="18" cy="16" r="3"></circle>
                </svg>
            <span class="text-sm sm:text-base">Tracks</span>
          </button>
          <button id="artistSearchTab" class="flex cursor-pointer items-center gap-2 border-b-2 px-3 sm:px-4 py-2 transition-colors whitespace-nowrap border-transparent text-gray-300 hover:text-white svelte-14p3n6n" role="tab" aria-selected="false" aria-label="Search artists">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-icon lucide lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="text-sm sm:text-base">Artists</span>
          </button>
          <button id="topTracksTab" class="flex cursor-pointer items-center gap-2 border-b-2 px-3 sm:px-4 py-2 transition-colors whitespace-nowrap border-transparent text-gray-300 hover:text-white svelte-14p3n6n" role="tab" aria-selected="false" aria-label="View top tracks">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-icon lucide lucide-trending-up"><path d="m3 17 6-6 4 4 8-8"/></svg>
            <span class="text-sm sm:text-base">Top Tracks</span>
            <span id="topTracksBadge" class="hidden ml-1 px-1.5 py-0.5 text-xs bg-red-500 text-white rounded-full">NEW</span>
          </button>
          <button id="favoritesTab" class="flex cursor-pointer items-center gap-2 border-b-2 px-3 sm:px-4 py-2 transition-colors whitespace-nowrap border-transparent text-gray-300 hover:text-white svelte-14p3n6n" role="tab" aria-selected="false" aria-label="View favorites">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <span class="text-sm sm:text-base">Favorites</span>
          </button>
        </div>

        <div id="resultsContainer">
          <div id="resultsGrid">
            <!-- <p id="placeholder">p.s: try out touhou songs</p> -->
          </div>
        </div>
      </div>
    </div>

    <footer class="player">
      <div
        class="audio-player-backdrop fixed inset-x-0 bottom-0 z-50 px-4 pt-16 pb-5 sm:px-6 sm:pt-16 sm:pb-6"
      >
        <div class="relative mx-auto w-full max-w-screen-2xl">
          <div
            class="audio-player-glass overflow-hidden rounded-2xl border shadow-2xl"
          >
            <div class="relative px-4 py-3">
              <div class="mb-3">
                <div class="progress-section">
                  <div id="progressContainer">
                    <div id="progressBar"></div>
                  </div>
                </div>
                <div class="mt-1 flex justify-between text-xs text-gray-400">
                  <span id="currentTime">0:00</span>
                  <span id="duration">0:00</span>
                </div>
              </div>

              <div
                class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
              >
                <div class="flex min-w-0 items-center gap-3 sm:flex-1">
                  <img
                    id="albumArt"
                    src="https://placehold.co/64x64"
                    alt="album art"
                    class="h-12 w-12 sm:h-16 sm:w-16 rounded object-cover shadow-lg"
                  />
                  <div class="min-w-0 flex-1">
                    <h3
                      class="truncate font-semibold text-white"
                      id="songTitle"
                    >
                      —
                    </h3>
                    <a
                      class="truncate text-sm text-gray-400 hover:text-blue-400 hover:underline inline-block"
                      id="songArtist"
                      >—</a
                    >
                    <p class="text-xs text-gray-500">
                      <span id="albumTitle">—</span>
                      <span class="mx-1" aria-hidden="true">•</span>
                      <span id="qualityLabel">—</span>
                    </p>
                  </div>
                </div>

                <div
                  class="flex flex-nowrap items-center justify-between gap-2 sm:gap-4"
                >
                  <div class="flex items-center justify-center gap-1 sm:gap-2">
                    <button
                      id="prevBtn"
                      class="p-1.5 sm:p-2 text-gray-400 transition-colors hover:text-white disabled:opacity-50"
                      title="previous"
                      aria-label="Previous track"
                    >
                      <i
                        data-lucide="skip-back"
                        style="width: 18px; height: 18px"
                      ></i>
                    </button>
                    <button
                      id="playBtn"
                      class="rounded-full bg-white p-2.5 sm:p-3 text-gray-900 transition-transform hover:scale-105"
                      title="play/pause"
                      aria-label="Play or pause"
                    >
                      <i
                        data-lucide="play"
                        class="play-icon"
                        style="width: 20px; height: 20px"
                      ></i>
                      <i
                        data-lucide="pause"
                        class="pause-icon"
                        style="display: none; width: 20px; height: 20px"
                      ></i>
                    </button>
                    <button
                      id="nextBtn"
                      class="p-1.5 sm:p-2 text-gray-400 transition-colors hover:text-white disabled:opacity-50"
                      title="next"
                      aria-label="Next track"
                    >
                      <i
                        data-lucide="skip-forward"
                        style="width: 18px; height: 18px"
                      ></i>
                    </button>
                  </div>

                  <div class="flex items-center gap-1 sm:gap-2">
                    <button
                      id="queueBtn"
                      class="player-toggle-button p-1.5 sm:p-2"
                      title="queue"
                      aria-label="Toggle queue panel"
                    >
                      <i
                        data-lucide="list-music"
                        style="width: 16px; height: 16px"
                      ></i>
                      <span class="hidden sm:inline"
                        >Queue (<span id="queueCount">0</span>)</span
                      >
                    </button>
                  </div>

                  <div class="flex items-center gap-2">
                    <button
                      class="p-1 sm:p-2 text-gray-400 transition-colors hover:text-white"
                      title="volume"
                      aria-label="Volume control"
                    >
                      <i
                        data-lucide="volume-2"
                        style="width: 16px; height: 16px"
                      ></i>
                    </button>
                    <input
                      id="volumeSlider"
                      type="range"
                      min="0"
                      max="1"
                      step="0.01"
                      value="0.7"
                      class="h-1 w-16 sm:w-24 cursor-pointer appearance-none rounded-lg bg-gray-700 accent-white"
                      aria-label="Volume level"
                    />
                  </div>
                </div>
              </div>

              <div
                id="queuePanel"
                class="queue-panel mt-4 space-y-3 rounded-2xl border p-4 text-sm shadow-inner"
                style="display: none"
              >
                <div class="flex items-center justify-between gap-2">
                  <div class="flex items-center gap-2 text-gray-300">
                    <i
                      data-lucide="list-music"
                      style="width: 18px; height: 18px"
                    ></i>
                    <span class="font-medium">Playback Queue</span>
                    <span
                      class="rounded-full bg-gray-800 px-2 py-0.5 text-xs text-gray-400"
                      id="queueLength"
                      >0</span
                    >
                  </div>
                  <div class="flex items-center gap-2">
                    <button
                      id="shuffleBtn"
                      class="flex items-center gap-1 rounded-full border border-transparent px-3 py-1 text-xs tracking-wide text-gray-400 uppercase transition-colors hover:border-blue-500 hover:text-blue-200"
                      title="shuffle"
                      aria-label="Shuffle queue"
                    >
                      <i
                        data-lucide="shuffle"
                        style="width: 14px; height: 14px"
                      ></i>
                      Shuffle
                    </button>
                    <button
                      id="clearBtn"
                      class="flex items-center gap-1 rounded-full border border-transparent px-3 py-1 text-xs tracking-wide text-gray-400 uppercase transition-colors hover:border-red-500 hover:text-red-400"
                      title="clear"
                      aria-label="Clear queue"
                    >
                      <i
                        data-lucide="trash-2"
                        style="width: 14px; height: 14px"
                      ></i>
                      Clear
                    </button>
                    <button
                      id="closeQueueBtn"
                      class="rounded-full p-1 text-gray-400 transition-colors hover:text-white"
                      title="close"
                      aria-label="Close queue panel"
                    >
                      <i data-lucide="x" style="width: 16px; height: 16px"></i>
                    </button>
                  </div>
                </div>
                <div id="queueListContainer">
                  <p
                    class="rounded-lg border border-dashed border-gray-700 bg-gray-900/70 px-3 py-8 text-center text-gray-400"
                  >
                    Queue is empty
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </footer>

    <audio id="audio"></audio>

    <script>
      const currentUser = localStorage.getItem("currentUser");
      if (!currentUser) {
        window.location.href = "login.html";
      }
      document.addEventListener("DOMContentLoaded", function () {
        lucide.createIcons();
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="./API.js"></script>
  </body>
</html>
